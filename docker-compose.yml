version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: smarttbasket_db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: seyma
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: smarttbasket
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: